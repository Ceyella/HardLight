# Patch versions of grass tile decals for custom transition respriting.
# Edit the PNGs in Textures/_HL/Decals/tile-patch.rsi/ to soften tile edges.

- type: decal
  id: TileGrass-patch
  tags: ["flora", "station", "markings"]
  snapCardinals: false
  defaultSnap: false
  sprite:
    sprite: /Textures/_HL/Decals/tile-patch.rsi
    state: floor-grass

