- type: entity
  name: watcher
  id: MobWatcherBase
  parent: [ SimpleSpaceMobBase, FlyingMobBase ]
  abstract: true
  description: It's like it's staring right through you.
  components:
  #- type: Flammable
  #  maximumFireStacks: 0
  #  firestacksOnIgnite: 0
  #  fireSpread: false
  #  canResistFire: false
  #  damage:
  #    types: {}
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
    blackboard:
      VisionRadius: !type:Single
        5
      AggroVisionRadius: !type:Single
        9
  - type: Sprite
    drawdepth: Mobs
    sprite: Mobs/Aliens/Lavaland/watcher.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: base
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: unshaded
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.30
        density: 80
        mask:
          - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: DamageStateVisuals
    states:
      Alive:
        Base: base
        BaseUnshaded: unshaded
      Dead:
        Base: dead
        BaseUnshaded: dead-unshaded
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
  - type: Butcherable
    spawned:
    - id: DiamondOre1
      amount: 2
    - id: LavalandWatcherSinew1
      amount: 2
    - id: MaterialBones1
      amount: 1
    - id: LavalandWatcherWing
      prob: 0.15
    - id: PKAUpgradeRange
      prob: 0.05
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3.5
  - type: MeleeWeapon
    angle: 0
    attackRate: 1
    animation: WeaponArcThrust
    damage:
      types:
        Piercing: 15
  - type: BasicEntityAmmoProvider
    proto: WatcherBolt
  - type: Gun
    fireRate: 0.5
    useKey: false
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/taser2.ogg
  - type: CombatMode
  - type: InteractionPopup
    successChance: 0.3
    interactSuccessString: petting-success-slimes
    interactFailureString: petting-failure-generic
    interactSuccessSound:
      path: /Audio/Animals/lizard_happy.ogg

- type: entity
  id: MobWatcherLavaland
  parent: MobWatcherBase
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: base
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: unshaded
      shader: unshaded
      color: red
  - type: PointLight
    radius: 1.5
    energy: 0.5
    color: red

- type: entity
  id: MobWatcherIcewing
  parent: MobWatcherBase
  name: icewing watcher
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      170: Dead
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: base
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: unshaded
      shader: unshaded
      color: deepskyblue
  - type: PointLight
    radius: 1.5
    energy: 1
    color: deepskyblue
  - type: BasicEntityAmmoProvider
    proto: WatcherBoltIcewing
  - type: Butcherable
    spawned:
    - id: DiamondOre1
      amount: 5
    - id: MaterialBones1
      amount: 1
    - id: PKAUpgradeRange
      prob: 0.08

- type: entity
  id: MobWatcherMagmawing
