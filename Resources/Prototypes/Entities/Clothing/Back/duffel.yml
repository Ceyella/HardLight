- type: entity
  parent: NFClothingDuffel # Frontier: ClothingBackpackDuffelNFClothingDuffel
  id: ClothingBackpackDuffelHolding
  name: duffelbag of holding
  description: A duffelbag that opens into a localized pocket of bluespace. It is unwieldy due to condensed gravitational emissions.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Back/Duffels/holding.rsi # Frontier
    state: icon
    layers:
    - state: icon
    - state: icon-unlit
      shader: unshaded
  - type: Item
    size: Ginormous
    inhandVisuals: # Frontier
      left: # Frontier
      - state: inhand-left # Frontier
      - state: inhand-left-unlit # Frontier
        shader: unshaded # Frontier
      right: # Frontier
      - state: inhand-right # Frontier
      - state: inhand-right-unlit # Frontier
        shader: unshaded # Frontier
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,19,9 # Frontier: Was 0,0,19,9 - FRONTIER MADE IT 0,0,7,7 AND THAT'S DUMB - Loki
  - type: Construction
    deconstructionTarget: null
    graph: bagfolding
    node: bluespacebackpackduffel
  - type: ClothingSpeedModifier
    sprintModifier: 0.75 # movespeed nerf in exchange for massive storage
  - type: HeldSpeedModifier
  - type: Clothing # Frontier
    sprite: _NF/Clothing/Back/Duffels/holding.rsi # Frontier
    clothingVisuals: # Frontier
      back: # Frontier
      - state: equipped-BACKPACK # Frontier
      - state: equipped-BACKPACK-unlit # Frontier
        shader: unshaded # Frontier
  - type: ChameleonClothing
    slot: [back]
    default: ClothingBackpackDuffelHolding
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ChameleonUiKey.Key:
        type: ChameleonBoundUserInterface
  - type: Tag
    tags:
    - ScurretWearable
    - WhitelistChameleon
    
- type: entity
  parent: [ContentsExplosionResistanceBase, RecyclableItemClothBasic]
  id: ClothingBackpackDuffelHoldingFolded
  name: folded salvage duffel bag
  description: it's folded
  components:
  - type: Sprite
    sprite: Clothing/Back/Duffels/holding.rsi
    state: folded
  - type: Item
    size: Tiny
  - type: Construction
    deconstructionTarget: null
    graph: bagfolding
    node: bluespacebackpackduffelfolded
    
